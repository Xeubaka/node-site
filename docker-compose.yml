services:
  backend:
    build: ./backend
    environment:
      PORT: "3000"
      DB_PATH: /data/app.db
      UPLOAD_DIR: /uploads
      SESSION_SECRET: ${SESSION_SECRET:-dev-secret-change-me}
      ADMIN_EMAIL: ${ADMIN_EMAIL:-admin@horus.test}
      ADMIN_PASSWORD: ${ADMIN_PASSWORD:-admin12345}
      DEMO_EMAIL: ${DEMO_EMAIL:-demo@horus.test}
      DEMO_PASSWORD: ${DEMO_PASSWORD:-demo12345}
      DEMO_NAME: ${DEMO_NAME:-Demo Designer}
    volumes:
      - db-data:/data
      - uploads:/uploads
    expose:
      - "3000"
    healthcheck:
      test:
        - CMD
        - node
        - -e
        - "require('http').get('http://127.0.0.1:3000/api/health',r=>process.exit(r.statusCode===200?0:1)).on('error',()=>process.exit(1))"
      interval: 10s
      timeout: 5s
      retries: 6
      start_period: 5s
    restart: unless-stopped

  nginx:
    image: nginx:1.27-alpine
    ports:
      - "8080:80"
    volumes:
      - ./frontend:/usr/share/nginx/html:ro
      - ./nginx/default.conf:/etc/nginx/conf.d/default.conf:ro
      - uploads:/usr/share/nginx/uploads:ro
    depends_on:
      backend:
        condition: service_healthy
    restart: unless-stopped

volumes:
  db-data:
  uploads:
