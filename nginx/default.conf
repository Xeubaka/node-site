# nginx front door: serves the static frontend and reverse-proxies the API.
# The backend is never exposed to the host directly — only nginx binds a port.

upstream backend {
    server backend:3000;
}

server {
    listen 80;
    server_name _;

    root /usr/share/nginx/html;
    index index.html;

    # Uploaded submission images (shared volume with the backend).
    location /uploads/ {
        alias /usr/share/nginx/uploads/;
        access_log off;
        expires 7d;
    }

    # WebSocket for real-time notifications. Must come before the generic /api/
    # block and carry the Upgrade/Connection headers so the connection upgrades.
    location = /api/ws {
        proxy_pass http://backend;
        proxy_http_version 1.1;
        proxy_set_header Upgrade $http_upgrade;
        proxy_set_header Connection "upgrade";
        proxy_set_header Host $host;
        proxy_set_header X-Real-IP $remote_addr;
        proxy_read_timeout 3600s;
        proxy_send_timeout 3600s;
    }

    # JSON API.
    location /api/ {
        proxy_pass http://backend;
        proxy_http_version 1.1;
        proxy_set_header Host $host;
        proxy_set_header X-Real-IP $remote_addr;
        proxy_set_header X-Forwarded-For $proxy_add_x_forwarded_for;
        client_max_body_size 12m;   # allow image uploads
    }

    # Static frontend (multi-page). Fall back to 404 for unknown paths.
    location / {
        try_files $uri $uri/ =404;
    }
}
